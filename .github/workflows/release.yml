name: Release

on:
  push:
    branches:
      - main

# Only allow one release at a time
concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: "24"

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run on main branch, not forks
    if: github.repository_owner != '' && !github.event.repository.fork
    permissions:
      contents: write # to create tags and releases
      issues: write # to comment on released issues
      pull-requests: write # to comment on released PRs

    steps:
      - name: Checkout repository (full history required for semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0 # Disable Husky Git hooks in CI environment
        run: npx semantic-release
